# Aurora Emulator - Android APK Build CI
#
# Builds a REAL working APK based on the GameNative fork.
# The APK includes: Box64, Wine, DXVK, Turnip driver, PulseAudio, X server.
#
# How to use:
# 1. Push code to GitHub
# 2. GitHub Actions builds the APK in the cloud (~10 min)
# 3. Download from: https://github.com/boiniArun2006/Aurora-emulator-smpl/actions
# 4. Install: adb install app-modern-debug.apk

name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.3.13750724" "cmake;3.22.1" || true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build modernDebug APK
        working-directory: android
        run: ./gradlew assembleModernDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aurora-modern-debug-apk
          path: android/app/build/outputs/apk/modern/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android/app/build/reports/
            android/build/reports/
          retention-days: 7
          if-no-files-found: warn
