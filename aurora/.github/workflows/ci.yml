# Aurora Emulator — Continuous Integration
#
# This workflow runs on every push to main and on every pull request.
# It verifies that:
#   1. The setup_third_party.sh script works on a clean Ubuntu machine
#   2. Basis Universal builds successfully from source
#   3. The Phase 1 PoC (AOT Texture Transcoder) runs end-to-end successfully
#
# Caches:
#   - basis_universal source clone (keyed on MANIFEST.txt content)
#   - basis_universal build artifacts (keyed on MANIFEST.txt + build script hash)
#
# Adding new phases? Extend the "Run tests" step below.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  build-and-test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================================================
      # Step 1: Check out the aurora project (just the aurora/ dir
      # is at repo root, so a standard checkout works)
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # Step 2: Install build dependencies
      # Ubuntu 22.04 ships: git, g++ 11, python3, pip, make
      # We need: cmake, Pillow (python), and a newer g++ for C++17
      # =========================================================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            python3 \
            python3-pip \
            python3-venv
          python3 -m pip install --upgrade pip
          python3 -m pip install Pillow
          echo "---- versions ----"
          g++ --version | head -1
          cmake --version | head -1
          python3 --version
          python3 -c "import PIL; print('Pillow', PIL.__version__)"

      # =========================================================
      # Step 3: Cache the basis_universal + meshoptimizer source clone
      # Keyed on MANIFEST.txt so changing the pinned ref busts cache
      # =========================================================
      - name: Cache third-party sources
        uses: actions/cache@v4
        with:
          path: |
            third_party/basis_universal
            third_party/meshoptimizer
          key: thirdparty-src-${{ hashFiles('third_party/MANIFEST.txt') }}
          restore-keys: |
            thirdparty-src-

      # =========================================================
      # Step 4: Cache the build artifacts
      # =========================================================
      - name: Cache third-party builds
        uses: actions/cache@v4
        with:
          path: |
            third_party/basis_universal/build
            third_party/basis_universal/bin
            third_party/meshoptimizer/build
          key: thirdparty-build-${{ hashFiles('third_party/MANIFEST.txt', 'scripts/setup_third_party.sh') }}

      # =========================================================
      # Step 5: Run the setup script (clones + builds basis_universal)
      # Skip the clone if cache hit (detected by checking if dir exists)
      # =========================================================
      - name: Set up third-party dependencies
        run: |
          chmod +x scripts/setup_third_party.sh
          bash scripts/setup_third_party.sh

      # =========================================================
      # Step 6: Verify basisu binary exists and runs
      # =========================================================
      - name: Verify basisu binary
        run: |
          ls -la third_party/basis_universal/bin/basisu
          third_party/basis_universal/bin/basisu --version

      # =========================================================
      # Step 6b: Verify meshoptimizer shared library exists
      # =========================================================
      - name: Verify meshoptimizer shared library
        run: |
          ls -la third_party/meshoptimizer/build/libmeshoptimizer.so

      # =========================================================
      # Step 7: Run Phase 1 PoC (AOT Texture Transcoder)
      # This generates 3 synthetic textures, encodes to KTX2/UASTC,
      # transcodes to ASTC, and reports metrics.
      # =========================================================
      - name: Run Phase 1 PoC test
        run: |
          python3 src/texture_engine/aot_texture_transcoder.py test --quality fast

      # =========================================================
      # Step 7b: Run Phase 2 PoC (AOT Mesh Simplifier)
      # Generates a 16k-tri UV sphere, simplifies to 4 LOD levels via QEM.
      # =========================================================
      - name: Run Phase 2 PoC test
        run: |
          python3 src/mesh_engine/aot_mesh_simplifier.py

      # =========================================================
      # Step 7c: Run Phase 3 PoC (Loader Engine with Predictive Prefetching)
      # Generates a synthetic play trace, trains a Markov model, simulates
      # runtime across cache sizes. Validates prefetching improves hit rate.
      # =========================================================
      - name: Run Phase 3 PoC test
        run: |
          python3 src/loader_engine/predictive_prefetcher.py

      # =========================================================
      # Step 7d: Run Phase 4 PoC (Shader Cache Infrastructure)
      # Simulates two users playing the same game: User 1 uploads shader
      # cache to cloud, User 2 downloads it and plays stutter-free.
      # Validates cache hit rate > 0 for User 2.
      # =========================================================
      - name: Run Phase 4 PoC test
        run: |
          python3 src/shader_engine/shader_cache.py

      # =========================================================
      # Step 7e: Run Phase 5 PoC (Orchestration Layer)
      # Runs the orchestrator on both Mali and Adreno simulated GPUs
      # to verify GPU-specific env vars are set correctly:
      #   - Mali: BOX64_MMAP32=0 set, TU_DEBUG NOT set
      #   - Adreno: TU_DEBUG=noconform set, BOX64_MMAP32 NOT set
      # =========================================================
      - name: Run Phase 5 PoC test (Mali)
        run: |
          python3 -m src.orchestrator.orchestrator_poc --gpu mali

      - name: Run Phase 5 PoC test (Adreno)
        run: |
          python3 -m src.orchestrator.orchestrator_poc --gpu adreno

      # =========================================================
      # Step 7f: Run Phase 6 PoC (Mali Vulkan Sanitizer)
      # Simulates a DXVK Vulkan call stream, runs it through the
      # Mali sanitizer, validates that crash-causing calls were
      # rewritten/blocked.
      # =========================================================
      - name: Run Phase 6 PoC test
        run: |
          python3 -m src.mali_sanitizer.mali_sanitizer_poc

      # =========================================================
      # Step 7g: Run Phase 7 PoC (Auto-Installer Framework)
      # Creates a fake game directory with multiple .exe files +
      # redistributable installers, tests that the auto-installer
        # correctly detects the main game .exe + finds all redists.
      # =========================================================
      - name: Run Phase 7 Auto-Installer PoC test
        run: |
          python3 -m src.auto_installer.auto_installer_poc

      # =========================================================
      # Step 7h: Run Phase 7b PoC (Audio Architecture)
      # Tests auto-driver-selection + ALSA + PulseAudio lifecycle
      # =========================================================
      - name: Run Phase 7b Audio PoC test
        run: |
          python3 src/audio_engine/audio_poc.py

      # =========================================================
      # Step 7i: Run Phase 7c PoC (Box64 + Wine + DXVK Integration)
      # Tests binary extraction + config generation + launch command
      # =========================================================
      - name: Run Phase 7c Integration PoC test
        run: |
          python3 src/integration_poc.py

      # =========================================================
      # Step 8: Verify outputs were produced (Phase 1 + 2 + 3 + 4 + 5)
      # =========================================================
      - name: Verify Phase 1 + 2 + 3 + 4 + 5 outputs
        run: |
          echo "=== Phase 1 outputs ==="
          ls -la tests/texture_engine_output/
          KTX2_COUNT=$(find tests/texture_engine_output -name "*.ktx2" | wc -l)
          ASTC_COUNT=$(find tests/texture_engine_output -name "*.astc" | wc -l)
          echo "KTX2 files: $KTX2_COUNT (expected >= 3)"
          echo "ASTC files: $ASTC_COUNT (expected >= 3)"
          if [ "$KTX2_COUNT" -lt 3 ] || [ "$ASTC_COUNT" -lt 3 ]; then
            echo "FAIL: Phase 1 expected at least 3 of each output file"
            exit 1
          fi
          echo
          echo "=== Phase 2 outputs ==="
          ls -la tests/mesh_engine_output/
          if [ ! -f tests/mesh_engine_output/mesh_pipeline_results.json ]; then
            echo "FAIL: Phase 2 expected mesh_pipeline_results.json"
            exit 1
          fi
          LOD_COUNT=$(python3 -c "import json; print(len(json.load(open('tests/mesh_engine_output/mesh_pipeline_results.json'))['lods']))")
          echo "LOD entries: $LOD_COUNT (expected >= 4)"
          if [ "$LOD_COUNT" -lt 4 ]; then
            echo "FAIL: Phase 2 expected at least 4 LOD levels"
            exit 1
          fi
          echo
          echo "=== Phase 3 outputs ==="
          ls -la tests/loader_engine_output/
          if [ ! -f tests/loader_engine_output/loader_pipeline_results.json ]; then
            echo "FAIL: Phase 3 expected loader_pipeline_results.json"
            exit 1
          fi
          # Validate that prefetching improved hit rate for at least one cache size
          IMPROVEMENT=$(python3 -c "
          import json
          data = json.load(open('tests/loader_engine_output/loader_pipeline_results.json'))
          results = data['stats']['results_by_cache_size']
          max_improvement = max(r['improvement_pp'] for r in results)
          print(f'{max_improvement:.1f}')
          ")
          echo "Best improvement: ${IMPROVEMENT}pp (expected > 0)"
          # Use python for the comparison (bc may not be installed)
          if python3 -c "import sys; sys.exit(0 if float('$IMPROVEMENT') > 0 else 1)"; then
            echo "PASS: prefetching improved hit rate"
          else
            echo "FAIL: Phase 3 prefetching did not improve hit rate"
            exit 1
          fi
          echo
          echo "=== Phase 4 outputs ==="
          ls -la tests/shader_engine_output/
          if [ ! -f tests/shader_engine_output/shader_pipeline_results.json ]; then
            echo "FAIL: Phase 4 expected shader_pipeline_results.json"
            exit 1
          fi
          # Validate that User 2's cache hit rate > 0 (cloud cache worked)
          HIT_RATE=$(python3 -c "
          import json
          data = json.load(open('tests/shader_engine_output/shader_pipeline_results.json'))
          stats = data['user2_runtime']
          hit_rate = stats['cache_hits'] / max(stats['total_psos'], 1)
          print(f'{hit_rate * 100:.1f}')
          ")
          echo "User 2 cache hit rate: ${HIT_RATE}% (expected > 0)"
          if python3 -c "import sys; sys.exit(0 if float('$HIT_RATE') > 0 else 1)"; then
            echo "PASS: cloud shader cache worked for User 2"
          else
            echo "FAIL: Phase 4 cloud cache did not work"
            exit 1
          fi
          echo
          echo "=== Phase 5 outputs ==="
          ls tests/orchestrator_engine_output/
          if [ ! -f tests/orchestrator_engine_output/orchestrator_pipeline_results.json ]; then
            echo "FAIL: Phase 5 expected orchestrator_pipeline_results.json"
            exit 1
          fi
          echo "Phase 5 PoC completed (both Mali and Adreno runs above)"
          echo
          echo "=== Phase 6 outputs ==="
          ls tests/mali_sanitizer_output/
          if [ ! -f tests/mali_sanitizer_output/mali_sanitizer_results.json ]; then
            echo "FAIL: Phase 6 expected mali_sanitizer_results.json"
            exit 1
          fi
          # Validate that the sanitizer rewrote at least 1 call
          REWRITTEN=$(python3 -c "
          import json
          data = json.load(open('tests/mali_sanitizer_output/mali_sanitizer_results.json'))
          print(data['stats']['rewritten'])
          ")
          echo "Calls rewritten by sanitizer: ${REWRITTEN} (expected > 0)"
          if python3 -c "import sys; sys.exit(0 if int('$REWRITTEN') > 0 else 1)"; then
            echo "PASS: Mali sanitizer rewrote crash-causing calls"
          else
            echo "FAIL: Phase 6 sanitizer did not rewrite any calls"
            exit 1
          fi
          echo
          echo "=== Phase 7 Auto-Installer outputs ==="
          ls tests/auto_installer_output/
          if [ ! -f tests/auto_installer_output/auto_installer_results.json ]; then
            echo "FAIL: Phase 7 expected auto_installer_results.json"
            exit 1
          fi
          # Validate that the auto-installer detected the main exe + found redists
          GAME_EXE=$(python3 -c "
          import json
          data = json.load(open('tests/auto_installer_output/auto_installer_results.json'))
          print(data['game_exe']['name'] or '')
          ")
          REDIST_COUNT=$(python3 -c "
          import json
          data = json.load(open('tests/auto_installer_output/auto_installer_results.json'))
          print(len(data['install_commands']))
          ")
          echo "Detected game exe: ${GAME_EXE} (expected: Witcher3.exe)"
          echo "Redistributables found: ${REDIST_COUNT} (expected >= 3)"
          if [ "$GAME_EXE" != "Witcher3.exe" ]; then
            echo "FAIL: Phase 7 did not detect the correct game exe"
            exit 1
          fi
          if python3 -c "import sys; sys.exit(0 if int('$REDIST_COUNT') >= 3 else 1)"; then
            echo "PASS: Auto-installer detected game exe + found redistributables"
          else
            echo "FAIL: Phase 7 did not find enough redistributables"
            exit 1
          fi
          echo
          echo "=== Phase 7b Audio outputs ==="
          ls tests/audio_engine_output/
          if [ ! -f tests/audio_engine_output/audio_engine_results.json ]; then
            echo "FAIL: Phase 7b expected audio_engine_results.json"
            exit 1
          fi
          AUDIO_TESTS=$(python3 -c "
          import json
          data = json.load(open('tests/audio_engine_output/audio_engine_results.json'))
          print(len(data['auto_selection_tests']))
          ")
          echo "Audio driver selection tests: ${AUDIO_TESTS} (expected 5)"
          if python3 -c "import sys; sys.exit(0 if int('$AUDIO_TESTS') >= 5 else 1)"; then
            echo "PASS: Audio architecture PoC completed"
          else
            echo "FAIL: Phase 7b did not run enough audio tests"
            exit 1
          fi
          echo
          echo "=== Phase 7c Integration outputs ==="
          ls tests/integration_output/
          if [ ! -f tests/integration_output/integration_results.json ]; then
            echo "FAIL: Phase 7c expected integration_results.json"
            exit 1
          fi
          LAUNCH_CMD=$(python3 -c "
          import json
          data = json.load(open('tests/integration_output/integration_results.json'))
          print(len(data['launch_command']))
          ")
          echo "Launch command components: ${LAUNCH_CMD} (expected 3: box64 wine game.exe)"
          if python3 -c "import sys; sys.exit(0 if int('$LAUNCH_CMD') >= 3 else 1)"; then
            echo "PASS: Integration PoC built launch command"
          else
            echo "FAIL: Phase 7c launch command incomplete"
            exit 1
          fi
          echo "PASS"

      # =========================================================
      # Step 9: Upload pipeline results as an artifact
      # Lets you inspect the metrics from the GitHub Actions UI
      # without re-running the workflow
      # =========================================================
      - name: Upload pipeline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: |
            tests/texture_engine_output/pipeline_results.json
            tests/texture_engine_output/*.ktx2
            tests/texture_engine_output/*.astc
            tests/mesh_engine_output/mesh_pipeline_results.json
            tests/mesh_engine_output/*.obj
            tests/loader_engine_output/loader_pipeline_results.json
            tests/loader_engine_output/markov_model.json
            tests/loader_engine_output/play_trace.json
            tests/shader_engine_output/shader_pipeline_results.json
            tests/orchestrator_engine_output/orchestrator_pipeline_results.json
            tests/mali_sanitizer_output/mali_sanitizer_results.json
            tests/auto_installer_output/auto_installer_results.json
            tests/audio_engine_output/audio_engine_results.json
            tests/integration_output/integration_results.json
          retention-days: 14
          if-no-files-found: warn
